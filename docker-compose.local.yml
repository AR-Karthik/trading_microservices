  telegram_alerter:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m utils.telegram_bot
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app

  cloud_publisher:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.cloud_publisher
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  dashboard_api:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000
    ipc: host
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app

  dashboard_frontend:
    build:
      context: ./dashboard/frontend
    ports:
      - "80:80"
    depends_on:
      - dashboard_api
    volumes:
      - ./dashboard/frontend/index.html:/usr/share/nginx/html/index.html

  db_init:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: db_init
    command: python -m daemons.init_db
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
