services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: trading_timescaledb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-trading}
      - TZ=Asia/Kolkata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - TZ=Asia/Kolkata
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-trading_redis}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trading_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tick_sensor:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: tick_sensor
    command: python -m daemons.tick_sensor
    ipc: host
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  snapshot_manager:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: snapshot_manager
    command: python -u -m daemons.snapshot_manager
    ipc: host
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  fii_dii_fetcher:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: fii_dii_fetcher
    command: python -m daemons.fii_dii_fetcher
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  regime_detector_nifty:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.regime_detector --asset NIFTY50
    ipc: host
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  regime_detector_banknifty:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.regime_detector --asset BANKNIFTY
    ipc: host
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  regime_detector_sensex:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.regime_detector --asset SENSEX
    ipc: host
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  market_sensor:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.market_sensor
    ipc: host
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  meta_router:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.meta_router
    ipc: host
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  strategy_engine:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.strategy_engine
    ipc: host
