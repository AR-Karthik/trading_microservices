  liquidation_daemon:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.liquidation_daemon
    ipc: host
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  system_controller:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -u -m daemons.system_controller
    ipc: host
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  shoonya_gateway:
    build:
      context: .
      dockerfile: Dockerfile.local
    ipc: host
    container_name: shoonya_gateway
