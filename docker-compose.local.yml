services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=trading
    # [Audit 6.4] Missing healthchecks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # [Audit 6.4] Missing healthchecks
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data_gateway:
    build:
      context: .
      dockerfile: Dockerfile.local
    env_file: .env # [Audit 7.3] Ensure environment variables are loaded
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  hmm_engine_nifty:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.hmm_engine --asset NIFTY50 --core 1
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  hmm_engine_banknifty:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.hmm_engine --asset BANKNIFTY --core 2
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  hmm_engine_sensex:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.hmm_engine --asset SENSEX --core 4
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  market_sensor:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.market_sensor
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  meta_router:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.meta_router
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  strategy_engine:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.strategy_engine
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  liquidation_daemon:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.liquidation_daemon
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  system_controller:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.system_controller
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  paper_bridge:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.paper_bridge
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  order_reconciler:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.order_reconciler
    depends_on:
      - redis
      - postgres
    env_file: .env
    volumes:
      - .:/app

  # [Audit 7.6] Adding missing services
  live_bridge:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.live_bridge
    depends_on:
      - redis
      - postgres
    env_file: .env
    volumes:
      - .:/app

  telegram_alerter:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m utils.telegram_bot
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app

  cloud_publisher:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.cloud_publisher
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app

  dashboard_api:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app

  dashboard_frontend:
    build:
      context: ./dashboard/frontend
    ports:
      - "80:80"
    depends_on:
      - dashboard_api

volumes:
  pgdata:
