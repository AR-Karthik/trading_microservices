services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: trading_timescaledb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-trading}
      - TZ=Asia/Kolkata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - TZ=Asia/Kolkata
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-trading_redis}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trading_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data_gateway:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: data_gateway
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  hmm_engine_nifty:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.hmm_engine --asset NIFTY50 --core 1
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  hmm_engine_banknifty:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.hmm_engine --asset BANKNIFTY --core 2
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  hmm_engine_sensex:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.hmm_engine --asset SENSEX --core 4
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  market_sensor:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.market_sensor
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  meta_router:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.meta_router
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  strategy_engine:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.strategy_engine
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  liquidation_daemon:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.liquidation_daemon
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  system_controller:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.system_controller
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  paper_bridge:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.paper_bridge
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  order_reconciler:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.order_reconciler
    depends_on:
      - redis
      - postgres
    env_file: .env
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  # [Audit 7.6] Adding missing services
  live_bridge:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.live_bridge
    depends_on:
      - redis
      - postgres
    env_file: .env
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  telegram_alerter:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m utils.telegram_bot
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app

  cloud_publisher:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m daemons.cloud_publisher
    depends_on:
      - redis
    env_file: .env
    volumes:
      - .:/app
      - /dev/shm:/ram_disk

  dashboard_api:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python -m uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app

  dashboard_frontend:
    build:
      context: ./dashboard/frontend
    ports:
      - "80:80"
    depends_on:
      - dashboard_api
    volumes:
      - ./dashboard/frontend/index.html:/usr/share/nginx/html/index.html

volumes:
  pgdata:
