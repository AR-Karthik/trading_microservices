<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ PROJECT K.A.R.T.H.I.K. v0.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #e6edf3; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(48, 54, 61, 0.5); }
        .oled-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .oled-card:hover { border-color: #00D2FF; box-shadow: 0 0 20px rgba(0, 210, 255, 0.1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .tab-active { color: #00D2FF; border-bottom: 2px solid #00D2FF; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); } 50% { box-shadow: 0 0 20px 0 rgba(248, 81, 73, 0.4); } }
        .animate-panic { animation: pulse-red 2s infinite; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .z-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 0.5rem; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#000000',
                        card: '#0a0a0a',
                        accent: '#00D2FF',
                        success: '#3fb950',
                        danger: '#f85149',
                        warning: '#d2990d',
                    }
                }
            }
        }
    </script>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TabIcon = ({ name, active }) => {
            const icons = {
                warroom: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
                playground: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>,
                evolution: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
                audit: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>,
                health: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>,
                history: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            };
            return <div className={active ? 'text-accent' : 'text-gray-500'}>{icons[name]}</div>;
        };

        const Dashboard = () => {
            const [mode, setMode] = useState('Paper');
            const [activeTab, setActiveTab] = useState('warroom');
            const [state, setState] = useState({
                alpha_score: 0, hmm_regime: 'UNKNOWN', gex_sign: 'UNKNOWN',
                system_halted: false, macro_lockdown: false,
                available_margin_paper: 0, available_margin_live: 0,
                signals: {}, power_five: {}, exit_path_70_30: { tp1: 0, tp2: 0, progress: 0 }
            });
            const [positions, setPositions] = useState([]);
            const [evolution, setEvolution] = useState({ leaderboard: [], transition_matrix: [], data_mix: { seed: 50, live: 50 } });
            const [telemetry, setTelemetry] = useState({ nse_latency_ms: 0, bse_latency_ms: 0, slippage_leakage_inr: 0, cpu_cores: [0, 0, 0] });
            const [attribution, setAttribution] = useState({ pnl_stack: [], efficiency: [] });
            
            const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';

            const fetchData = async () => {
                try {
                    const [s, p, e, t, a] = await Promise.all([
                        fetch(`${API_BASE}/state`).then(r => r.json()),
                        fetch(`${API_BASE}/portfolio?mode=${mode}`).then(r => r.json()),
                        fetch(`${API_BASE}/models/evolution`).then(r => r.json()),
                        fetch(`${API_BASE}/health/telemetry`).then(r => r.json()),
                        fetch(`${API_BASE}/attribution/strategy`).then(r => r.json())
                    ]);
                    setState(s);
                    setPositions(p);
                    setEvolution(e);
                    setTelemetry(t);
                    setAttribution(a);
                } catch (err) { console.error("Poll failed", err); }
            };

            useEffect(() => {
                fetchData();
                const i = setInterval(fetchData, 1000);
                return () => clearInterval(i);
            }, [mode]);

            const handlePanic = async () => {
                if(confirm(`🚨 KILL SWITCH: Liquidate all ${mode} positions?`)) {
                    await fetch(`${API_BASE}/panic?mode=${mode}`, { method: 'POST' });
                }
            };

            const formatCurrency = (v) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(v);

            // Sub-Components for Tabs
            const WarRoom = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Power Five Matrix */}
                        <div className="oled-card p-5 rounded-2xl flex flex-col justify-between h-48">
                            <h3 className="text-[10px] font-black uppercase text-gray-500">Power Five Matrix (Z-Score)</h3>
                            <div className="z-matrix mt-4">
                                {Object.entries(state.power_five).map(([sym, z]) => (
                                    <div key={sym} className="text-center">
                                        <div className="text-[8px] text-gray-400 font-bold">{sym}</div>
                                        <div className={`text-lg font-black mono ${z > 1.5 ? 'text-success' : (z < -1.5 ? 'text-danger' : 'text-accent')}`}>{z > 0 ? '+' : ''}{z.toFixed(1)}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Regime Indicator */}
                        <div className="oled-card p-5 rounded-2xl flex flex-col items-center justify-center h-48 border-l-4 border-accent">
                            <span className="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-2">Regime Orchestrator</span>
                            <div className="text-3xl font-black uppercase text-white">{state.hmm_regime}</div>
                            <div className={`mt-2 px-3 py-1 rounded text-[10px] font-bold ${state.alpha_score > 0 ? 'bg-success/20 text-success' : 'bg-danger/20 text-danger'}`}>Alpha: {state.alpha_score.toFixed(1)}</div>
                        </div>

                        {/* Active Position Card */}
                        <div className="oled-card p-5 rounded-2xl h-48">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-[10px] font-black uppercase text-gray-500">70:30 Exit Path</h3>
                                <span className="text-[9px] font-bold text-accent">LTP: Tracking...</span>
                            </div>
                            <div className="relative w-full h-4 bg-white/5 rounded-full overflow-hidden mb-6">
                                <div className="absolute left-0 h-full bg-accent transition-all duration-1000" style={{ width: `${state.exit_path_70_30.progress}%` }}></div>
                                <div className="absolute left-[70%] top-0 h-full w-[2px] bg-white border-none shadow-[0_0_10px_white]" title="TP1 (70%)"></div>
                            </div>
                            <div className="flex justify-between text-[10px] mono">
                                <div className="text-gray-400">Entry: <span className="text-white">---</span></div>
                                <div className="text-gray-400">TP1: <span className="text-success">{state.exit_path_70_30.tp1.toFixed(1)}</span></div>
                                <div className="text-gray-400">TP2: <span className="text-accent">{state.exit_path_70_30.tp2.toFixed(1)}</span></div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                         {/* Positions Table */}
                         <div className="oled-card rounded-2xl p-6">
                            <h3 className="text-xs font-black uppercase mb-6 flex justify-between">
                                <span>Active Engagements</span>
                                <span className="text-accent">{positions.length}</span>
                            </h3>
                            <div className="space-y-4 max-h-96 overflow-y-auto scroll-hide">
                                {positions.map((p, i) => (
                                    <div key={i} className="flex justify-between items-center border-b border-white/5 pb-4">
                                        <div>
                                            <div className="font-bold text-sm tracking-tight">{p.symbol}</div>
                                            <div className="text-[10px] text-gray-500 uppercase font-black">{p.strategy_id}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="mono font-bold text-sm">{formatCurrency(p.unrealized_pnl)}</div>
                                            <div className={`text-[10px] font-bold ${p.quantity > 0 ? 'text-success' : 'text-danger'}`}>{p.quantity > 0 ? 'LONG' : 'SHORT'} {Math.abs(p.quantity)}</div>
                                        </div>
                                    </div>
                                ))}
                                {positions.length === 0 && <div className="text-center py-20 text-gray-700 font-bold uppercase text-[10px] tracking-widest">Awaiting Signal...</div>}
                            </div>
                         </div>

                         {/* Controls & Emergency */}
                         <div className="space-y-6">
                            <div className="oled-card p-6 rounded-2xl border-l-4 border-danger animate-panic">
                                <h3 className="text-xs font-black text-danger uppercase mb-4">Tactical Emergency</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={handlePanic} className="bg-danger text-white py-4 rounded-xl font-black text-xs uppercase tracking-tighter hover:brightness-125 transition-all">Liquidate All</button>
                                    <button className="bg-white/5 border border-white/10 text-gray-400 py-4 rounded-xl font-black text-xs uppercase cursor-not-allowed">Halt VM</button>
                                </div>
                            </div>
                            <div className="oled-card p-6 rounded-2xl">
                                <h3 className="text-xs font-black text-gray-500 uppercase mb-4">Capital Allocation</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-end">
                                        <span className="text-[10px] text-gray-400 font-bold uppercase">Margin Avail ({mode})</span>
                                        <span className="text-xl font-black mono text-white">{formatCurrency(mode === 'Paper' ? state.available_margin_paper : state.available_margin_live)}</span>
                                    </div>
                                    <div className="w-full bg-white/5 h-2 rounded-full"><div className="bg-success h-full rounded-full" style={{ width: '85%' }}></div></div>
                                </div>
                            </div>
                         </div>
                    </div>
                </div>
            );

            const Playground = () => (
                <div className="space-y-6 oled-card p-8 rounded-3xl animate-in slide-in-from-bottom-5 duration-500">
                    <div className="flex justify-between items-start mb-8">
                        <div>
                            <h3 className="text-xl font-black text-white">Regime Orchestrator</h3>
                            <p className="text-xs text-gray-500 mt-1 uppercase font-bold tracking-widest">Modular V6.2 Logic Control</p>
                        </div>
                        <button className="bg-accent text-dark px-6 py-2 rounded-full font-black text-[10px] uppercase hover:scale-105 transition-transform">Hot-Swap Settings</button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div className="space-y-10">
                            <div>
                                <label className="text-[10px] font-black uppercase text-gray-500 block mb-4">Engine Selector</label>
                                <select className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs font-bold text-white outline-none appearance-none">
                                    <option>HMM (Probabilistic)</option>
                                    <option>Deterministic (Z-Score)</option>
                                    <option>Hybrid (Consensus Mode)</option>
                                </select>
                            </div>
                            <div className="space-y-8">
                                {[
                                    { label: 'Hurst Threshold', val: 0.55, min: 0.4, max: 0.7 },
                                    { label: 'Hybrid Confidence Floor', val: 0.70, min: 0.5, max: 0.95 },
                                    { label: 'VPIN Toxicity Limit', val: 0.82, min: 0.5, max: 1.0 }
                                ].map(s => (
                                    <div key={s.label}>
                                        <div className="flex justify-between text-[10px] font-black uppercase text-gray-400 mb-2">
                                            <span>{s.label}</span>
                                            <span className="text-accent">{s.val.toFixed(2)}</span>
                                        </div>
                                        <input type="range" className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-accent" min={s.min} max={s.max} step="0.01" defaultValue={s.val} />
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-accent/5 rounded-3xl p-8 border border-accent/10">
                            <h4 className="text-[10px] font-black uppercase text-accent mb-4">Meta-Router Influence</h4>
                            <div className="space-y-6 italic text-[11px] leading-relaxed text-gray-400">
                                <p>Currently injecting <strong>SMACrossover</strong> and <strong>OIPulse</strong> strategies into the execution stream based on State 1 (Trending Up) classification.</p>
                                <p>Fractional Kelly multiplier restricted to 1.5x to preserve liquidity against VPIN Toxicity.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const Evolution = () => (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in zoom-in-95 duration-500">
                    <div className="oled-card p-6 rounded-3xl">
                        <h3 className="text-xs font-black uppercase text-gray-500 mb-6">HMM Leaderboard (Last 30 Docs)</h3>
                        <table className="w-full text-left text-[11px]">
                            <thead>
                                <tr className="text-gray-500 border-b border-white/5 uppercase">
                                    <th className="pb-4">Version</th>
                                    <th className="pb-4">Log-LL</th>
                                    <th className="pb-4">Shadow P/L</th>
                                    <th className="pb-4">Status</th>
                                </tr>
                            </thead>
                            <tbody className="mono">
                                {evolution.leaderboard.map((m, i) => (
                                    <tr key={i} className="border-b border-white/5 hover:bg-white/5">
                                        <td className="py-4 font-bold">{m.version}</td>
                                        <td className="py-4">{m.log_likelihood}</td>
                                        <td className={`py-4 ${m.shadow_pnl > 0 ? 'text-success' : 'text-danger'}`}>{formatCurrency(m.shadow_pnl)}</td>
                                        <td className="py-4"><span className={`px-2 py-0.5 rounded ${m.status === 'LIVE' ? 'bg-accent/20 text-accent' : 'text-gray-600'}`}>{m.status}</span></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <div className="space-y-8">
                        <div className="oled-card p-6 rounded-3xl">
                             <h3 className="text-xs font-black uppercase text-gray-500 mb-6">Transition Matrix Heatmap</h3>
                             <div className="grid grid-cols-3 gap-2">
                                {evolution.transition_matrix.flat().map((v, i) => (
                                    <div key={i} className="aspect-square flex items-center justify-center rounded-lg mono text-xs font-bold" style={{ backgroundColor: `rgba(0, 210, 255, ${v})`, color: v > 0.5 ? '#000' : '#fff' }}>
                                        {Math.round(v * 100)}%
                                    </div>
                                ))}
                             </div>
                        </div>
                        <div className="oled-card p-6 rounded-3xl flex justify-between items-center">
                            <div>
                                <h3 className="text-xs font-black text-gray-500 uppercase">Data Mix Gauge</h3>
                                <div className="text-lg font-bold mt-1">{evolution.data_mix.live}% Live DNA / {evolution.data_mix.seed}% Seed</div>
                            </div>
                            <button className="bg-success text-dark px-6 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-success/10 hover:scale-105 transition-all">Approve v1.4.3-rc1</button>
                        </div>
                    </div>
                </div>
            );

            const Performance = () => (
                <div className="space-y-8 animate-in fade-in duration-500 pb-20">
                     <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="oled-card p-8 rounded-3xl">
                            <h3 className="text-xs font-black uppercase text-gray-500 mb-8">P&L Stacked Bar (Daily)</h3>
                            <div className="flex items-end gap-2 h-48 px-4">
                                {attribution.pnl_stack.map((d, i) => (
                                    <div key={i} className="flex-1 flex flex-col items-center group relative">
                                        <div className="w-full bg-accent/20 h-10 rounded-t-sm" title="Momentum"></div>
                                        <div className="w-full bg-success/30 h-14" title="Fade"></div>
                                        <div className="w-full bg-warning/20 h-6" title="A-VWAP"></div>
                                        <span className="text-[8px] text-gray-600 mt-2 rotate-45">{d.date.slice(5)}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="oled-card p-8 rounded-3xl">
                            <h3 className="text-xs font-black uppercase text-gray-500 mb-8">Signal Efficiency Scatter</h3>
                            <div className="relative h-48 border-l border-b border-white/10">
                                {attribution.efficiency.map((e, i) => (
                                    <div key={i} className="absolute rounded-full flex items-center justify-center text-[8px] font-black text-dark group" 
                                         style={{ 
                                            left: `${(e.win_rate - 0.4) * 200}%`, 
                                            bottom: `${(e.profit_factor - 1.0) * 50}%`,
                                            width: `${e.frequency}px`, height: `${e.frequency}px`,
                                            backgroundColor: e.profit_factor > 1.5 ? '#00D2FF' : '#f85149'
                                         }}>
                                        <span className="opacity-0 group-hover:opacity-100 transition-opacity bg-white p-1 rounded -top-8 absolute whitespace-nowrap text-dark">{e.name}: PF {e.profit_factor}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-between text-[8px] font-bold text-gray-600 px-1 mt-2">
                                <span>Win Rate (0.4 - 0.8)</span>
                                <span>Efficiency Index</span>
                            </div>
                        </div>
                     </div>
                </div>
            );

            const Health = () => (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in slide-in-from-right-5 duration-500">
                    <div className="oled-card p-8 rounded-3xl col-span-2 space-y-12">
                         <div className="flex justify-between items-center">
                            <h3 className="text-xs font-black text-gray-500 uppercase">NSE vs BSE Latency race</h3>
                            <span className="text-[10px] text-accent mono">Jitter: < 0.2ms</span>
                         </div>
                         <div className="space-y-10">
                            <div>
                                <div className="flex justify-between text-[10px] font-black mb-2 uppercase"><span>NSE Ingest (Colo)</span> <span className="text-success">{telemetry.nse_latency_ms.toFixed(1)}ms</span></div>
                                <div className="w-full bg-white/5 h-1.5 rounded-full"><div className="bg-success h-full rounded-full transition-all duration-300" style={{ width: `${(telemetry.nse_latency_ms/30)*100}%` }}></div></div>
                            </div>
                            <div>
                                <div className="flex justify-between text-[10px] font-black mb-2 uppercase"><span>BSE Ingest (Colo)</span> <span className="text-warning">{telemetry.bse_latency_ms.toFixed(1)}ms</span></div>
                                <div className="w-full bg-white/5 h-1.5 rounded-full"><div className="bg-warning h-full rounded-full transition-all duration-300" style={{ width: `${(telemetry.bse_latency_ms/30)*100}%` }}></div></div>
                            </div>
                         </div>
                    </div>

                    <div className="space-y-6">
                        <div className="oled-card p-6 rounded-3xl">
                            <h3 className="text-[10px] font-black text-gray-500 uppercase mb-2">Slippage Leakage</h3>
                            <div className="text-3xl font-black text-danger mono tracking-tighter">₹{telemetry.slippage_leakage_inr.toFixed(0)}</div>
                            <p className="text-[9px] text-gray-600 mt-1 uppercase font-bold">Lost to execution delay</p>
                        </div>
                        <div className="oled-card p-6 rounded-3xl">
                            <h3 className="text-[10px] font-black text-gray-500 uppercase mb-4">Core Load Heatmap</h3>
                            <div className="flex gap-2">
                                {telemetry.cpu_cores.map((c, i) => (
                                    <div key={i} className="flex-1 aspect-square rounded-xl flex items-center justify-center mono text-[10px] font-bold" style={{ backgroundColor: `rgba(255, 255, 255, ${c/100})`, color: c > 50 ? '#000' : '#fff' }}>
                                        C{i+1}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            // Desktop App Container
            return (
                <div className="flex flex-col h-screen">
                    {/* Top Multi-Tab Nav */}
                    <nav className="glass bg-black/90 p-4 sticky top-0 z-[100] border-b border-white/10 flex justify-between items-center">
                        <div className="flex items-center gap-8">
                            <div className="mr-8">
                                <h1 className="text-lg font-black tracking-tighter text-white">🦸‍♂️ K.A.R.T.H.I.K. <span className="text-[8px] bg-accent/20 text-accent px-1.5 py-0.5 rounded ml-2">v0.9</span></h1>
                                <div className="text-[7px] text-gray-600 font-black uppercase tracking-widest mt-0.5">Kinetic Alpha Regime Tracking</div>
                            </div>
                            <div className="flex gap-6">
                                {[
                                    { id: 'warroom', label: 'War Room' },
                                    { id: 'playground', label: 'Orchestrator' },
                                    { id: 'evolution', label: 'Evolution' },
                                    { id: 'audit', label: 'Audit' },
                                    { id: 'health', label: 'Health' },
                                    { id: 'history', label: 'Analytics' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 pb-2 transition-all ${activeTab === tab.id ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}`}>
                                        <TabIcon name={tab.id} active={activeTab === tab.id} />
                                        <span className="text-[10px] uppercase font-black tracking-tight">{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex gap-4">
                             <button onClick={() => setMode(mode === 'Paper' ? 'Actual' : 'Paper')} className={`px-4 py-1.5 rounded-full text-[9px] font-black border transition-all ${mode === 'Paper' ? 'border-accent text-accent' : 'border-success text-success'}`}>
                                MODE: {mode.toUpperCase()}
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 p-8 overflow-y-auto scroll-hide">
                         {activeTab === 'warroom' && <WarRoom />}
                         {activeTab === 'playground' && <Playground />}
                         {activeTab === 'evolution' && <Evolution />}
                         {activeTab === 'audit' && <Performance />}
                         {activeTab === 'health' && <Health />}
                         {activeTab === 'history' && <div className="oled-card p-20 text-center rounded-3xl uppercase font-black text-gray-700 tracking-[1em]">Historical Sync Active</div>}
                    </main>

                    {/* Footer Status Bar */}
                    <footer className="glass border-t border-white/5 p-2 px-6 flex justify-between items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest">
                         <div className="flex gap-6">
                            <span className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-success"></div> Redis Cluster</span>
                            <span className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-success"></div> Timescale Stream</span>
                         </div>
                         <div className="mono text-gray-400">© 2026 AR-KARTHIK SYSTEMS</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
