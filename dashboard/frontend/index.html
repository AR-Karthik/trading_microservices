<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ PROJECT K.A.R.T.H.I.K. </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --theme-accent: #00D2FF; --theme-accent-rgb: 0, 210, 255; }
        .theme-actual { --theme-accent: #3fb950; --theme-accent-rgb: 63, 185, 80; }
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #e6edf3; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .oled-card { background: #070707; border: 1px solid #1a1a1a; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .k-letter { color: var(--theme-accent); font-weight: 900; text-shadow: 0 0 15px rgba(var(--theme-accent-rgb), 0.8); font-size: 1.1em; }
        
        .tab-active { color: var(--theme-accent); border-bottom: 2px solid var(--theme-accent); }
        .btn-neon { background: transparent; border: 1px solid var(--theme-accent); color: var(--theme-accent); transition: all 0.3s; }
        .btn-neon:hover:not(:disabled) { background: var(--theme-accent); color: #000; box-shadow: 0 0 20px rgba(var(--theme-accent-rgb), 0.4); }
        .btn-neon:disabled { opacity: 0.5; cursor: not-allowed; border-color: #333; color: #666; }
        
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); } 50% { box-shadow: 0 0 20px 0 rgba(248, 81, 73, 0.4); } }
        .animate-panic { animation: pulse-red 2s infinite; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        
        /* Heatmap Backgrounds */
        .bg-regime-trending { background: radial-gradient(circle at center, rgba(63, 185, 80, 0.1) 0%, #000 70%); }
        .bg-regime-crash { background: radial-gradient(circle at center, rgba(248, 81, 73, 0.1) 0%, #000 70%); }
        .bg-regime-ranging { background: radial-gradient(circle at center, rgba(210, 153, 13, 0.1) 0%, #000 70%); }
        
        .terminal-log { font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.5; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { dark: '#000000', card: '#070707', accent: 'var(--theme-accent)', success: '#3fb950', danger: '#f85149', warning: '#d2990d' } }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;
        
        const formatCurrency = (v) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(v);

        // API Base
        const API_BASE = (() => {
            const h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return 'http://127.0.0.1:8000';
            if (h.endsWith('.run.app')) return ''; 
            return `${window.location.protocol}//${h}:8000`;
        })();

        // --- GLOBAL COMPONENTS ---
        const Header = ({ mode, setMode, asset, setAsset, handlePanic }) => (
            <nav className="glass p-4 sticky top-0 z-[100] border-b border-white/10 flex justify-between items-center px-8">
                <div className="flex items-center gap-8">
                    <div>
                        <h1 className="text-xl font-bold tracking-tight text-gray-300">
                            Project : <span className="k-letter">K</span>inetic <span className="k-letter">A</span>lgorithmic <span className="k-letter">R</span>eal-<span className="k-letter">T</span>ime <span className="k-letter">H</span>igh-<span className="k-letter">I</span>ntensity <span className="k-letter">K</span>night <span className="text-[9px] bg-accent/20 text-accent px-2 py-0.5 rounded ml-2 font-black align-middle">v8.2</span>
                        </h1>
                    </div>
                </div>
                <div className="flex gap-6 items-center">
                    <button onClick={() => setMode(mode === 'Paper' ? 'Actual' : 'Paper')} className={`px-4 py-1.5 rounded-full text-[10px] font-black border-2 transition-all ${mode === 'Paper' ? 'border-accent text-accent bg-accent/5' : 'border-success text-success bg-success/5'}`}>
                        {mode.toUpperCase()} MODE
                    </button>
                    <button onClick={handlePanic} className="bg-danger/20 border border-danger text-danger px-6 py-2 rounded font-black text-xs uppercase animate-panic hover:bg-danger hover:text-white transition-all shadow-lg shadow-danger/20">
                        GLOBAL LIQUIDATE
                    </button>
                </div>
            </nav>
        );

        // --- TAB 1: COMMAND CENTER ---
        const CommandCenter = ({ state, asset, setAsset }) => {
            const regimeClass = state.hmm_regime.includes('TREND') ? 'bg-regime-trending' : (state.hmm_regime.includes('CRASH') ? 'bg-regime-crash' : 'bg-regime-ranging');
            const signals = state.signals || {};
            const p5 = state.power_five?.[asset] || state.power_five?.[state.primary_asset] || {};
            const p5_data = Object.keys(p5).length > 0 ? p5 : (asset === 'BANKNIFTY' ? {'HDFCBANK': 1.5, 'ICICIBANK': 2.0, 'SBIN': -0.5, 'AXISBANK': 0.2, 'KOTAKBANK': 1.1} : { 'HDFCBANK': 1.2, 'RELIANCE': -0.5, 'ICICIBANK': 2.1, 'INFY': 0.0, 'ITC': -1.5 });
            
            return (
                <div className={`space-y-6 animate-in fade-in duration-500 rounded-3xl p-6 ${regimeClass} min-h-[70vh]`}>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Market Pulse */}
                        <div className="oled-card p-6 rounded-2xl flex flex-col justify-between">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-[10px] font-black uppercase text-gray-500">Market Pulse</h3>
                                <select value={asset} onChange={e => setAsset(e.target.value)} className="bg-white/5 border border-white/10 text-[9px] font-bold px-2 py-1 outline-none text-white rounded">
                                    <option value="NIFTY50">NIFTY50</option>
                                    <option value="BANKNIFTY">BANKNIFTY</option>
                                    <option value="SENSEX">SENSEX</option>
                                </select>
                            </div>
                            <div className="flex justify-between items-end mb-4">
                                <div>
                                    <div className="text-[10px] text-gray-400 font-bold uppercase">LTP</div>
                                    <div className="text-3xl font-black mono text-white">{signals.price || '—'}</div>
                                </div>
                                <div className="text-right">
                                    <div className={`text-xl font-black mono ${signals.change_pct >= 0 ? 'text-success' : 'text-danger'}`}>{signals.change_pct > 0 ? '+' : ''}{signals.change_pct?.toFixed(2)}%</div>
                                </div>
                            </div>
                            <div className="flex justify-between text-[10px] font-bold text-gray-400 mb-1 mt-4">
                                <span>Vol-Regime</span>
                                <span className={state.hmm_regime.includes('TREND') ? 'text-success' : 'text-warning'}>{state.hmm_regime}</span>
                            </div>
                            <div className="mt-6 border-t border-white/10 pt-4">
                                <div className="text-[9px] font-black uppercase text-gray-500 mb-2">Smart Money Flow Ribbon</div>
                                <div className="h-2 w-full rounded-full bg-gradient-to-r from-danger via-gray-600 to-success relative">
                                    <div className="absolute w-1 h-3 bg-white top-[-2px] shadow-[0_0_5px_white]" style={{ left: `${(state.smart_money_flow || 0.5) * 100}%` }}></div>
                                </div>
                            </div>
                        </div>

                        {/* Power Five Matrix */}
                        <div className="oled-card p-6 rounded-2xl">
                            <h3 className="text-[10px] font-black uppercase text-gray-500 mb-4">Power Five Matrix</h3>
                            <div className="grid grid-cols-5 gap-2 h-32">
                                {Object.entries(p5_data).map(([sym, z]) => (
                                    <div key={sym} className="flex flex-col items-center justify-end group">
                                        <div className="w-full bg-white/5 rounded-t relative h-full overflow-hidden flex items-end">
                                            <div className={`w-full transition-all ${z > 1.5 ? 'bg-accent shadow-[0_0_15px_#00D2FF]' : 'bg-gray-600'}`} style={{ height: `${Math.min(100, Math.max(10, (z + 3) / 6 * 100))}%` }}></div>
                                        </div>
                                        <div className="text-[7px] text-gray-400 font-bold mt-2 truncate w-full text-center">{sym}</div>
                                        <div className={`text-[8px] mono font-black ${z > 1.5 ? 'text-accent' : ''}`}>{z.toFixed(1)}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Pivot Zone */}
                        <div className="oled-card p-6 rounded-2xl">
                            <h3 className="text-[10px] font-black uppercase text-gray-500 mb-4">The Pivot Zone</h3>
                            <div className="space-y-4 font-mono text-sm max-w-sm">
                                <div className="flex justify-between items-center text-success border-b border-white/5 pb-2">
                                    <span>Call Wall (Resistance)</span>
                                    <span className="font-black">{signals.call_wall}</span>
                                </div>
                                <div className="flex justify-between items-center text-accent bg-accent/5 p-2 rounded">
                                    <span>Whales Pivot</span>
                                    <span className="font-black">{state.whales_pivot?.toFixed(0)}</span>
                                </div>
                                <div className="flex justify-between items-center text-warning p-2">
                                    <span>Gamma Flip (ZGL)</span>
                                    <span className="font-black">{signals.gamma_flip?.toFixed(0)}</span>
                                </div>
                                <div className="flex justify-between items-center text-danger border-t border-white/5 pt-2">
                                    <span>Put Wall (Support)</span>
                                    <span className="font-black">{signals.put_wall}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 2: PORTFOLIO & RISK ---
        const PortfolioRisk = ({ positions, telemetry, delta }) => {
            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="oled-card p-6 rounded-2xl col-span-2">
                            <h3 className="text-[10px] font-black uppercase text-gray-500 mb-6">Active Trades</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-[11px]">
                                    <thead>
                                        <tr className="text-gray-500 border-b border-white/5 uppercase text-[9px]">
                                            <th className="pb-3">UUID</th>
                                            <th className="pb-3">Instrument</th>
                                            <th className="pb-3">Entry Price</th>
                                            <th className="pb-3">Delta (Δ)</th>
                                            <th className="pb-3">Theta (Θ)</th>
                                            <th className="pb-3">Risk Light</th>
                                        </tr>
                                    </thead>
                                    <tbody className="mono">
                                        {positions.length === 0 && <tr><td colSpan="6" className="text-center py-8 text-gray-600 font-bold uppercase text-[10px]">No Active Positions</td></tr>}
                                        {positions.map((p, i) => {
                                            const riskColor = Math.abs(p.delta) < 0.15 ? 'bg-success' : (Math.abs(p.delta) > 0.4 ? 'bg-danger animate-pulse' : 'bg-warning');
                                            return (
                                                <tr key={i} className="border-b border-white/5 hover:bg-white/5">
                                                    <td className="py-3 text-gray-500">{p.parent_uuid?.slice(0, 8) || 'N/A'}</td>
                                                    <td className="py-3 font-bold text-white"><span className={p.quantity>0 ? 'text-success':'text-danger'}>{p.quantity>0?'L':'S'}</span> {p.symbol}</td>
                                                    <td className="py-3">{p.avg_price?.toFixed(2)}</td>
                                                    <td className="py-3">{p.delta?.toFixed(3)}</td>
                                                    <td className="py-3 text-warning">{p.theta?.toFixed(3)}</td>
                                                    <td className="py-3"><div className={`w-3 h-3 rounded-full ${riskColor} shadow-[0_0_8px_currentColor]`} /></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="oled-card p-6 rounded-2xl flex flex-col items-start">
                            <h3 className="text-[10px] font-black uppercase text-gray-500 mb-6 w-full text-left">Liquidity Thermometer</h3>
                            <div className="flex-1 w-full flex justify-center items-end px-4 gap-8">
                                <div className="w-24 h-48 bg-white/5 rounded-t-full border border-white/10 relative overflow-hidden flex flex-col justify-end">
                                    <div className="w-full bg-warning h-[15%]" title="Hedge Reserve"></div>
                                    <div className="w-full bg-danger h-[25%]" title="Used Margin"></div>
                                    <div className="w-full bg-success flex-1" title="Free Cash"></div>
                                </div>
                                <div className="text-[9px] font-bold text-gray-400 space-y-8 uppercase h-48 flex flex-col justify-around py-4">
                                    <div>Free Cash<br/><span className="text-success mono">{formatCurrency(750000)}</span></div>
                                    <div>Used Margin<br/><span className="text-danger mono">{formatCurrency(250000)}</span></div>
                                    <div>Reserve<br/><span className="text-warning mono">{formatCurrency(150000)}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 3: STRATEGY ALPHA ---
        const StrategyAlpha = ({ state }) => {
            const [logs, setLogs] = useState([]);
            
            useEffect(() => {
                fetch(`${API_BASE}/logs/hunter`).then(r => r.json()).then(setLogs).catch(()=>{});
                const i = setInterval(() => {
                    fetch(`${API_BASE}/logs/hunter`).then(r => r.json()).then(setLogs).catch(()=>{});
                }, 2000);
                return () => clearInterval(i);
            }, []);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-500">
                    <div className="oled-card p-6 rounded-2xl">
                        <h3 className="text-[10px] font-black uppercase text-gray-500 mb-4 flex justify-between">
                            <span>Hunter Logs (Meta-Router)</span>
                            <span className="text-accent animate-pulse">● LIVE</span>
                        </h3>
                        <div className="h-96 bg-black border border-white/5 rounded p-4 overflow-y-auto terminal-log flex flex-col-reverse relative">
                            {logs && logs.map((l, i) => {
                                const t = l.time ? l.time.split('T')[1].slice(0,8) : '00:00:00';
                                return (
                                <div key={i} className={`mb-1 ${l.message?.includes('VETO') ? 'text-warning' : (l.message?.includes('APPROVED') ? 'text-success' : 'text-gray-400')}`}>
                                    <span className="text-gray-600 mr-2">[{t}]</span>
                                    {l.message}
                                </div>
                            )})}
                            <div className="absolute bottom-2 right-4 w-2 h-4 bg-accent animate-pulse"></div>
                        </div>
                    </div>
                    <div className="oled-card p-6 rounded-2xl">
                        <h3 className="text-[10px] font-black uppercase text-gray-500 mb-4">Adaptive Oscillator (ASTO)</h3>
                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <div className="text-[9px] font-bold text-gray-500 uppercase">Current ASTO</div>
                                <div className="text-3xl font-black mono text-accent">{(state.signals?.asto || 0).toFixed(2)}</div>
                            </div>
                            <div className="text-right">
                                <div className="text-[9px] font-bold text-gray-500 uppercase">Adaptive Multiplier</div>
                                <div className="text-xl font-bold mono text-warning">{(state.signals?.asto_multiplier || 3.0).toFixed(2)}x</div>
                            </div>
                        </div>
                        <div className="relative h-48 border-t border-b border-white/10 flex items-center bg-white/[0.02]">
                            {/* Hedge Zones */}
                            <div className="absolute top-0 w-full h-[15%] bg-purple-500/10 border-b border-purple-500/30"></div>
                            <div className="absolute bottom-0 w-full h-[15%] bg-purple-500/10 border-t border-purple-500/30"></div>
                            <div className="absolute w-full h-[1px] bg-white/20"></div>
                            <div className="text-[8px] absolute top-2 right-2 text-purple-400 font-bold">+90 HEDGE ZONE</div>
                            <div className="text-[8px] absolute bottom-2 right-2 text-purple-400 font-bold">-90 HEDGE ZONE</div>
                            
                            {/* Mock Sine Wave representing ASTO */}
                            <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 100 100">
                                <path d="M 0 50 Q 25 20, 50 50 T 100 50" fill="none" stroke="var(--theme-accent)" strokeWidth="2" />
                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 4: SYSTEM HEALTH ---
        const SystemHealth = ({ telemetry }) => {
            const shm_diff = telemetry.shm_last_update ? ((Date.now()/1000) - telemetry.shm_last_update).toFixed(1) : '—';
            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-500">
                    <div className="oled-card p-6 rounded-2xl">
                        <h3 className="text-[10px] font-black uppercase text-gray-500 mb-6">Gateway Status</h3>
                        <div className="space-y-6">
                            {['NIFTY50', 'BANKNIFTY', 'SENSEX'].map(idx => (
                                <div key={idx} className="flex bg-white/5 p-4 rounded border border-white/5 items-center justify-between">
                                    <div>
                                        <div className="text-[9px] font-black uppercase text-gray-400">{idx} Latency</div>
                                        <div className="mono font-bold text-sm mt-1">{telemetry.nse_latency_ms?.toFixed(2) || '0.45'} ms</div>
                                    </div>
                                    <div className={`w-3 h-3 rounded-full shadow-[0_0_10px_currentColor] ${(telemetry.nse_latency_ms || 0) < 1.0 ? 'bg-success text-success' : 'bg-warning text-warning'}`}></div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="oled-card p-6 rounded-2xl flex flex-col justify-between text-center">
                        <h3 className="text-[10px] font-black uppercase text-gray-500 mb-6 text-left">SHM Monitor (Shared Memory Vector)</h3>
                        <div className="text-4xl font-black mono text-white mb-2">{shm_diff}s</div>
                        <div className="text-[9px] font-bold text-gray-500 uppercase">Since last vector update</div>
                        <div className="h-16 w-full mt-4 relative flex items-center justify-center overflow-hidden border border-white/10 rounded">
                            <div className="w-full h-0.5 bg-accent/20 absolute"></div>
                            {parseFloat(shm_diff) < 2.0 ? (
                                <svg width="200" height="60" viewBox="0 0 200 60" className="absolute text-accent animate-pulse">
                                    <path d="M 0 30 L 80 30 L 90 10 L 110 50 L 120 30 L 200 30" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" />
                                </svg>
                            ) : (
                                <div className="w-full h-0.5 bg-danger shadow-[0_0_10px_currentColor] text-danger absolute"></div>
                            )}
                        </div>
                    </div>
                    
                    <div className="oled-card p-6 rounded-2xl col-span-1 lg:col-span-2">
                        <h3 className="text-[10px] font-black uppercase text-gray-500 mb-6">Daemon Heartbeats</h3>
                        <div className="flex gap-4 flex-wrap">
                            {['NSE_MD', 'BSE_MD', 'OMS_EXEC', 'META_ROUTER', 'HMM_ENGINE', 'RISK_DAEMON', 'CLD_SYNC', 'TELEMETRY'].map((d, i) => {
                                const active = telemetry.daemons?.includes(d) || i < 5;
                                return (
                                <div key={d} className="flex flex-col items-center justify-center p-2 bg-white/5 rounded min-w-[80px] group cursor-default border border-white/5 hover:border-white/20 transition-all">
                                    <div className={`w-3 h-3 rounded-full shadow-[0_0_8px_currentColor] ${active ? 'bg-success text-success' : 'bg-danger text-danger'}`}></div>
                                    <div className="text-[7px] font-black tracking-widest text-gray-400 mt-2">{d}</div>
                                </div>
                            )})}
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 5: ANALYTICS & EOD ---
        const GateToggles = () => {
            const [gates, setGates] = useState({});
            const fetchGates = () => fetch(`${API_BASE}/config/gates`).then(r => r.json()).then(setGates).catch(()=>{});
            useEffect(() => { fetchGates(); }, []);

            const toggleGate = async (gate) => {
                await fetch(`${API_BASE}/config/gates?gate=${gate}&enabled=${!gates[gate]}`, {method:'POST'});
                fetchGates();
            };

            return (
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
                    {Object.entries(gates).map(([name, enabled]) => (
                        <button key={name} onClick={() => toggleGate(name)} className={`p-4 rounded-2xl border transition-all flex flex-col items-start gap-2 ${enabled ? 'bg-success/5 border-success/30 text-success shadow-[0_0_15px_rgba(63,185,80,0.1)]' : 'bg-white/5 border-white/10 text-gray-500'}`}>
                            <span className="text-[9px] font-black uppercase tracking-widest">{name} GATE</span>
                            <span className="text-xl font-black uppercase">{enabled ? 'ACTIVE' : 'BYPASSED'}</span>
                        </button>
                    ))}
                </div>
            );
        };

        const AnalyticsEOD = ({ analytics = {}, fiidii = [] }) => {
            const [timeRange, setTimeRange] = useState('Today');
            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-500">
                        <div className="oled-card p-6 rounded-2xl">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-[10px] font-black uppercase text-gray-500">Performance Metrics</h3>
                                <div className="flex gap-2 items-center">
                                    <select value={timeRange} onChange={e=>setTimeRange(e.target.value)} className="bg-white/5 border border-white/10 text-[9px] font-bold px-2 py-1 outline-none text-white rounded cursor-pointer">
                                        <option>Today</option>
                                        <option>This Week</option>
                                        <option>This Month</option>
                                    </select>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="bg-white/5 p-3 rounded">
                                    <div className="text-[8px] font-bold text-gray-500 uppercase">Daily P&L</div>
                                    <div className="text-lg font-black mono text-success">{formatCurrency(analytics.total_pnl || 14500)}</div>
                                </div>
                                <div className="bg-white/5 p-3 rounded">
                                    <div className="text-[8px] font-bold text-gray-500 uppercase">Sharpe Ratio</div>
                                    <div className="text-lg font-black mono text-white">2.65</div>
                                </div>
                            </div>
                            <div className="h-48 border border-white/5 bg-white/[0.02] rounded relative flex items-end">
                                <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 100 100">
                                    <path d="M 0 100 L 20 80 L 40 85 L 60 50 L 80 30 L 100 20 L 100 100 Z" fill="rgba(63, 185, 80, 0.1)" stroke="none" />
                                    <path d="M 0 100 L 20 80 L 40 85 L 60 50 L 80 30 L 100 20" fill="none" stroke="#3fb950" strokeWidth="2" />
                                </svg>
                            </div>
                        </div>
                        <div className="oled-card p-6 rounded-2xl">
                            <h3 className="text-[10px] font-black uppercase text-gray-500 mb-6">Whale Prep (FII/DII Data)</h3>
                            <div className="space-y-6">
                                {(fiidii.length?fiidii:[{category:'FII', buyValue: 4500, sellValue: 3000, netValue: 1500}, {category:'DII', buyValue: 2000, sellValue: 2500, netValue: -500}]).map(v => (
                                    <div key={v.category}>
                                        <div className="flex justify-between text-[10px] font-bold mb-2 uppercase">
                                            <span className="text-gray-400">{v.category} FLOW</span>
                                            <span className={v.netValue >= 0 ? 'text-success' : 'text-danger'}>NET: {v.netValue > 0 ? '+' : ''}{v.netValue} Cr</span>
                                        </div>
                                        <div className="flex h-6 rounded overflow-hidden">
                                            <div className="bg-success text-[8px] text-black font-bold flex items-center justify-center" style={{width: `${(v.buyValue/(v.buyValue+v.sellValue))*100}%`}}>LONG</div>
                                            <div className="bg-danger text-[8px] text-white font-bold flex items-center justify-center" style={{width: `${(v.sellValue/(v.buyValue+v.sellValue))*100}%`}}>SHORT</div>
                                        </div>
                                    </div>
                                ))}
                                <div className="mt-8 pt-4 border-t border-white/10 text-center">
                                    <div className="text-[9px] font-black text-gray-500 uppercase mb-2">Tomorrow's Market Bias</div>
                                    <div className="text-xl font-black text-accent tracking-widest bg-accent/10 py-2 rounded">BULLISH</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <GateToggles />
                </div>
            );
        };

        // --- TAB 6: SYSTEM CONFIG ---
        const StrategyLaunchPad = () => {
            const [strats, setStrats] = useState({});
            const fetchStrats = () => fetch(`${API_BASE}/config/strategies/live`).then(r => r.json()).then(setStrats).catch(()=>{});
            useEffect(() => { fetchStrats(); }, []);

            const toggleStrat = async (s) => {
                await fetch(`${API_BASE}/config/strategies/live?strat=${s}&enabled=${!strats[s]}`, {method:'POST'});
                fetchStrats();
            };

            return (
                <div className="oled-card p-8 rounded-3xl mt-6">
                    <h3 className="text-xs font-black uppercase text-gray-500 mb-6">Strategy Launch Pad</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {Object.entries(strats).map(([name, live]) => (
                            <div key={name} className="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/10">
                                <div>
                                    <div className="text-[10px] font-black text-gray-300 uppercase">{name}</div>
                                    <div className={`text-[8px] font-bold mt-1 uppercase ${live ? 'text-success' : 'text-gray-500'}`}>{live ? 'Live Trading Enabled' : 'Paper Only'}</div>
                                </div>
                                <button onClick={() => toggleStrat(name)} className={`w-12 h-6 rounded-full relative transition-all ${live ? 'bg-success' : 'bg-gray-800'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${live ? 'right-1' : 'left-1'}`}></div>
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const SystemConfig = () => {
            const [unlocked, setUnlocked] = useState(false);
            const [totalCapital, setTotalCapital] = useState(1000000);
            const [maxAllocPct, setMaxAllocPct] = useState(40);
            const [hedgeResPct, setHedgeResPct] = useState(15);
            const [maxLoss, setMaxLoss] = useState(50000);
            const [maxDD, setMaxDD] = useState(15000);
            const [trailStop, setTrailStop] = useState(1.5);
            const [capStatus, setCapStatus] = useState('');
            const [riskStatus, setRiskStatus] = useState('');

            const saveCapAlloc = async () => {
                if(!unlocked) return;
                try {
                    await fetch(`${API_BASE}/config/capital_alloc`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({total_capital: totalCapital, max_allocation_pct: maxAllocPct, hedge_reserve_pct: hedgeResPct})
                    });
                    setCapStatus('SAVED TO REDIS');
                    setTimeout(()=>setCapStatus(''), 2000);
                } catch(e) {}
            };

            const saveRiskLimits = async () => {
                if(!unlocked) return;
                try {
                    await fetch(`${API_BASE}/config/risk_limits`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({daily_max_loss: maxLoss, max_drawdown: maxDD, trailing_stop_multi: trailStop})
                    });
                    setRiskStatus('SAVED TO REDIS');
                    setTimeout(()=>setRiskStatus(''), 2000);
                } catch(e) {}
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500 pb-20">
                    <div className="oled-card p-6 rounded-2xl flex justify-between items-center border border-white/10 mb-6 glass">
                        <div>
                            <h3 className="text-sm font-black text-white uppercase flex items-center gap-2">
                                {unlocked ? <span className="text-warning">🔓 SYSTEM UNLOCKED</span> : <span className="text-success">🔒 SAFETY LOCKED</span>}
                            </h3>
                        </div>
                        <button onClick={() => setUnlocked(!unlocked)} className={`px-6 py-2 rounded-full font-black text-[10px] uppercase transition-all ${unlocked ? 'bg-warning/20 text-warning border border-warning' : 'bg-success/20 text-success border border-success'}`}>
                            {unlocked ? "LOCK SYSTEM" : "UNLOCK TO EDIT"}
                        </button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className={`oled-card p-8 rounded-3xl transition-opacity ${unlocked?'opacity-100':'opacity-60'}`}>
                            <h3 className="text-xs font-black uppercase text-gray-500 mb-6">Capital Allocation</h3>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[9px] font-bold text-gray-400 uppercase">Total Trading Capital (₹)</label>
                                    <input type="number" disabled={!unlocked} value={totalCapital} onChange={e=>setTotalCapital(Number(e.target.value))} className="w-full bg-black border border-white/10 mt-1 p-3 text-white font-mono rounded" />
                                </div>
                                <div className="flex justify-end pt-4">
                                     <button disabled={!unlocked} onClick={saveCapAlloc} className="btn-neon px-6 py-3 rounded font-black text-[10px] uppercase">Save to Redis</button>
                                </div>
                            </div>
                        </div>

                        <div className={`oled-card p-8 rounded-3xl transition-opacity ${unlocked?'opacity-100':'opacity-60'}`}>
                            <h3 className="text-xs font-black uppercase text-gray-500 mb-6">Risk Limits</h3>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[9px] font-bold text-gray-400 uppercase">Daily Max Loss (₹)</label>
                                    <input type="number" disabled={!unlocked} value={maxLoss} onChange={e=>setMaxLoss(Number(e.target.value))} className="w-full bg-danger/10 border border-danger/30 mt-1 p-3 text-danger font-mono rounded" />
                                </div>
                                <div className="flex justify-end pt-4">
                                    <button disabled={!unlocked} onClick={saveRiskLimits} className="btn-neon px-6 py-3 rounded font-black text-[10px] uppercase">Commit Change</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <StrategyLaunchPad />
                </div>
            )
        }

        // --- TAB 7: DEEP DIVE (HDD) ---
        const DeepDive = ({ state, asset }) => {
            const [efficacy, setEfficacy] = useState([]);
            useEffect(() => {
                const fetchEff = () => fetch(`${API_BASE}/analytics/meta_router_efficacy`).then(r => r.json()).then(setEfficacy).catch(()=>{});
                fetchEff();
                const i = setInterval(fetchEff, 5000);
                return () => clearInterval(i);
            }, []);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in slide-in-from-bottom-4 duration-700">
                    <div className="lg:col-span-2 oled-card p-8 rounded-[2rem] bg-gradient-to-br from-[#070707] to-black border-white/5 shadow-2xl">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <h3 className="text-sm font-black text-white tracking-widest uppercase">The Truth Matrix</h3>
                                <p className="text-[10px] text-gray-500 font-bold mt-1 uppercase">Meta-Router Veto Efficacy & Alpha Preservation</p>
                            </div>
                        </div>
                        
                        <div className="space-y-4">
                            {efficacy.map((eff, i) => (
                                <div key={i} className="group flex items-center gap-6 p-4 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.05] hover:border-accent/30 transition-all cursor-default">
                                    <div className="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center text-accent font-black text-xs">
                                        {eff.rejection_count}
                                    </div>
                                    <div className="flex-1">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-[11px] font-black text-gray-300 uppercase tracking-wider">{eff.veto_reason}</span>
                                            <span className="text-[10px] font-bold text-accent mono">+{eff.lots_saved} Lots Saved</span>
                                        </div>
                                        <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div className="h-full bg-accent shadow-[0_0_10px_#00D2FF]" style={{ width: `${Math.min(100, (eff.rejection_count/50)*100)}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="oled-card p-8 rounded-[2rem] bg-black border-white/5 flex flex-col items-center justify-center text-center relative overflow-hidden group">
                        <div className="absolute inset-0 bg-accent/5 opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                        <div className="text-[10px] font-black text-gray-500 uppercase mb-8 tracking-[0.2em]">Counterfactual Ledger</div>
                        <div className="w-40 h-40 rounded-full border border-accent/20 flex items-center justify-center relative mb-8">
                             <div className="absolute inset-2 rounded-full border border-accent/40 animate-pulse"></div>
                             <div className="text-4xl font-black text-white mono">91<span className="text-accent text-sm">%</span></div>
                        </div>
                        <div className="text-xs font-bold text-gray-400 uppercase leading-relaxed">
                            Meta-Router has prevented<br/>
                            <span className="text-white">Significant Theoretical Drawdown</span><br/>
                            this session by enforcing<br/>
                            <span className="text-accent">Institutional Guards.</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN DASHBOARD APP ---
        const Dashboard = () => {
            const [mode, setMode] = useState('Paper');
            const [asset, setAsset] = useState('NIFTY50');
            const [activeTab, setActiveTab] = useState('CMD');
            const [state, setState] = useState({ hmm_regime: 'UNKNOWN', signals: {}, power_five: {} });
            const [positions, setPositions] = useState([]);
            const [telemetry, setTelemetry] = useState({});
            
            const fetchData = async () => {
                try {
                    const [s, p, t] = await Promise.all([
                        fetch(`${API_BASE}/state?asset=${asset}`).then(r => r.json()),
                        fetch(`${API_BASE}/portfolio?mode=${mode}`).then(r => r.json()),
                        fetch(`${API_BASE}/health/telemetry`).then(r => r.json())
                    ]);
                    setState(s); setPositions(p); setTelemetry(t);
                } catch(e) {}
            };

            useEffect(() => {
                fetchData();
                const i = setInterval(fetchData, 2000);
                return () => clearInterval(i);
            }, [mode, asset]);

            const panic = () => { if(confirm("🚨 TRIGGER GLOBAL LIQUIDATE?")) fetch(`${API_BASE}/panic?mode=${mode}`,{method:'POST'}); };

            const tabs = [
                {id: 'CMD', label: 'Command Center'},
                {id: 'PORT', label: 'Portfolio & Risk'},
                {id: 'ALPHA', label: 'Strategy Alpha'},
                {id: 'HLTH', label: 'System Health'},
                {id: 'EOD', label: 'Analytics & EOD'},
                {id: 'HDD', label: 'Deep Dive'},
                {id: 'CONF', label: 'System Config'}
            ];

            return (
                <div className={`flex flex-col h-screen select-none ${mode === 'Actual' ? 'theme-actual' : ''}`}>
                    <Header mode={mode} setMode={setMode} asset={asset} setAsset={setAsset} handlePanic={panic} />
                    
                    <div className="glass px-8 pt-4 flex justify-between border-b border-white/10 shadow-lg items-center">
                        <div className="flex gap-8">
                            {tabs.map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`pb-3 text-[10px] uppercase font-black tracking-widest transition-all ${activeTab === t.id ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}`}>
                                    {t.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-1 p-8 overflow-y-auto">
                        {activeTab === 'CMD' && <CommandCenter state={state} asset={asset} setAsset={setAsset} />}
                        {activeTab === 'PORT' && <PortfolioRisk positions={positions} telemetry={telemetry} />}
                        {activeTab === 'ALPHA' && <StrategyAlpha state={state} />}
                        {activeTab === 'HLTH' && <SystemHealth telemetry={telemetry} />}
                        {activeTab === 'EOD' && <AnalyticsEOD analytics={state.analytics} />}
                        {activeTab === 'HDD' && <DeepDive state={state} asset={asset} />}
                        {activeTab === 'CONF' && <SystemConfig />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
