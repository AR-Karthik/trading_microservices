<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karthik's Trading AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #07090d; color: #e6edf3; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(22, 27, 34, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(48, 54, 61, 0.5); }
        .accent-glow { box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 5rem); }
        .tab-bar { padding-bottom: env(safe-area-inset-bottom); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#07090d',
                        card: '#161b22',
                        accent: '#00D2FF',
                        success: '#3fb950',
                        danger: '#f85149',
                        warning: '#d2990d',
                    }
                }
            }
        }
    </script>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Dashboard = () => {
            const [mode, setMode] = useState('Paper');
            const [activeTab, setActiveTab] = useState('portfolio');
            const [state, setState] = useState({
                alpha_score: 0,
                hmm_regime: 'UNKNOWN',
                gex_sign: 'UNKNOWN',
                system_halted: false,
                macro_lockdown: false,
                available_margin_paper: 0,
                available_margin_live: 0
            });
            const [positions, setPositions] = useState([]);
            const [loading, setLoading] = useState(true);

            const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';

            const fetchData = async () => {
                try {
                    const [stateRes, portRes] = await Promise.all([
                        fetch(`${API_BASE}/state`),
                        fetch(`${API_BASE}/portfolio?mode=${mode}`)
                    ]);
                    const stateData = await stateRes.json();
                    const portData = await portRes.json();
                    setState(stateData);
                    setPositions(portData);
                    setLoading(false);
                } catch (err) {
                    console.error("Fetch failed", err);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [mode]);

            const handlePanic = async () => {
                if(confirm(`⚠️ WARNING: Are you sure you want to SQUARE OFF ALL ${mode} positions?`)) {
                    await fetch(`${API_BASE}/panic?mode=${mode}`, { method: 'POST' });
                    alert("Panic signal sent!");
                }
            };

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);
            };

            return (
                <div className="min-h-screen flex flex-col bg-dark">
                    {/* Header */}
                    <header className="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-white/5">
                        <div>
                            <h1 className="text-lg font-extrabold tracking-tight">KARTHIK AI</h1>
                            <div className="text-[10px] text-gray-500 uppercase tracking-widest">{mode} DEPLOYMENT</div>
                        </div>
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setMode(mode === 'Paper' ? 'Actual' : 'Paper')}
                                className={`px-3 py-1 rounded-full text-[10px] font-bold border ${mode === 'Paper' ? 'border-accent text-accent' : 'border-success text-success'}`}
                            >
                                {mode.toUpperCase()}
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 safe-bottom space-y-6">
                        {/* Alpha Section */}
                        <section className="glass rounded-2xl p-6 text-center accent-glow">
                            <div className="text-[10px] text-gray-400 uppercase tracking-[0.2em] mb-2">Current Alpha State</div>
                            <div className="text-5xl font-black mono text-accent tracking-tighter">
                                {state.alpha_score.toFixed(1)}
                            </div>
                            <div className="mt-4 flex justify-center gap-2">
                                <span className="px-2 py-1 glass rounded-md text-[10px] font-bold text-success border border-success/30 underline decoration-success">HMM: {state.hmm_regime}</span>
                                <span className="px-2 py-1 glass rounded-md text-[10px] font-bold text-accent border border-accent/30 lowercase italic">GEX: {state.gex_sign}</span>
                            </div>
                        </section>

                        {/* Status Banners */}
                        {state.macro_lockdown && (
                            <div className="bg-danger/10 border border-danger/30 text-danger p-3 rounded-xl text-center text-xs font-bold animate-pulse-soft">
                                📵 MACRO LOCKDOWN ACTIVE
                            </div>
                        )}

                        {/* Summary Grid */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="glass p-4 rounded-2xl">
                                <div className="text-[9px] text-gray-500 uppercase font-bold mb-1">Margin Avail</div>
                                <div className="text-sm font-bold mono">
                                    {formatCurrency(mode === 'Paper' ? state.available_margin_paper : state.available_margin_live)}
                                </div>
                            </div>
                            <div className="glass p-4 rounded-2xl">
                                <div className="text-[9px] text-gray-500 uppercase font-bold mb-1">Daily P/L</div>
                                <div className={`text-sm font-bold mono ${positions.reduce((acc, p) => acc + p.realized_pnl, 0) >= 0 ? 'text-success' : 'text-danger'}`}>
                                    {formatCurrency(positions.reduce((acc, p) => acc + p.realized_pnl, 0))}
                                </div>
                            </div>
                        </div>

                        {/* Positions List */}
                        <section>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xs font-black uppercase tracking-widest text-gray-400">Live Positions</h2>
                                <span className="text-[10px] bg-white/5 px-2 py-0.5 rounded text-gray-500">{positions.length} Active</span>
                            </div>
                            <div className="space-y-3">
                                {positions.length > 0 ? positions.map((p, i) => (
                                    <div key={i} className="glass p-4 rounded-2xl border-l-4 border-accent">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <div className="text-sm font-bold leading-tight">{p.symbol}</div>
                                                <div className="text-[9px] text-gray-500 font-medium tracking-tight">Strategy: {p.strategy_id}</div>
                                            </div>
                                            <div className={`px-2 py-0.5 rounded text-[10px] font-bold ${p.quantity >= 0 ? 'bg-success/10 text-success' : 'bg-danger/10 text-danger'}`}>
                                                {p.quantity > 0 ? 'LONG' : 'SHORT'} {Math.abs(p.quantity)}
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-end mt-4">
                                            <div className="text-[10px] text-gray-500">
                                                Avg: <span className="text-gray-300 mono">{p.avg_price.toFixed(2)}</span>
                                            </div>
                                            <div className="text-right">
                                                <div className={`text-xs font-bold mono ${p.unrealized_pnl >= 0 ? 'text-success' : 'text-danger'}`}>
                                                    {p.unrealized_pnl >= 0 ? '+' : ''}{p.unrealized_pnl.toFixed(1)}
                                                </div>
                                                <div className="text-[8px] text-gray-600 uppercase font-bold">Unrealized</div>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="text-center py-12 glass rounded-2xl border-dashed border-2 border-white/5 text-gray-600 text-xs italic">
                                        No active positions detected
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* Settings & Crisis (Only if activeTab is settings) */}
                        {activeTab === 'settings' && (
                            <section className="space-y-4">
                                <h2 className="text-xs font-black uppercase tracking-widest text-gray-400 px-1">Crisis Controls</h2>
                                <button 
                                    onClick={handlePanic}
                                    className="w-full bg-danger text-white py-4 rounded-2xl font-black text-lg shadow-2xl shadow-danger/20 active:scale-95 transition-transform"
                                >
                                    SQUARE OFF ALL
                                </button>
                                <div className="glass p-4 rounded-2xl mt-8">
                                    <h3 className="text-[10px] font-bold uppercase text-gray-500 mb-4">Capital Management</h3>
                                    <p className="text-[10px] text-gray-600 italic">Settings adjustment moved to API command center for security.</p>
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 glass tab-bar border-t border-white/10 px-6 py-2 flex justify-between items-center z-50">
                        <button 
                            onClick={() => setActiveTab('portfolio')}
                            className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'portfolio' ? 'text-accent' : 'text-gray-500'}`}
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Portfolio</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('analytics')}
                            className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'analytics' ? 'text-accent' : 'text-gray-500 opacity-30'}`}
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                            </svg>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Stats</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('settings')}
                            className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'settings' ? 'text-accent' : 'text-gray-500'}`}
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Control</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
