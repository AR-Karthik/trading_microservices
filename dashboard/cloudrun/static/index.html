<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ PROJECT K.A.R.T.H.I.K. </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --theme-accent: #00D2FF;
            --theme-accent-rgb: 0, 210, 255;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #e6edf3;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(48, 54, 61, 0.5);
        }

        .oled-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .oled-card:hover {
            border-color: var(--theme-accent);
            box-shadow: 0 0 20px rgba(var(--theme-accent-rgb), 0.1);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .tab-active {
            color: var(--theme-accent);
            border-bottom: 2px solid var(--theme-accent);
        }

        @keyframes pulse-red {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4);
            }

            50% {
                box-shadow: 0 0 20px 0 rgba(248, 81, 73, 0.4);
            }
        }

        .animate-panic {
            animation: pulse-red 2s infinite;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }

        .z-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 0.5rem;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#000000',
                        card: '#0a0a0a',
                        accent: 'var(--theme-accent)',
                        success: '#3fb950',
                        danger: '#f85149',
                        warning: '#d2990d',
                    }
                }
            }
        }
    </script>
</head>

<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        const TabIcon = ({ name, active }) => {
            const icons = {
                warroom: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
                playground: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>,
                evolution: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
                audit: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>,
                health: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>,
                history: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
                sim: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>
            };
            return <div className={active ? 'text-accent' : 'text-gray-500'}>{icons[name]}</div>;
        };

        const formatCurrency = (v) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(v);

        // --- SUB-COMPONENTS (Lifted Outside) ---

        const VolatilitySurface = memo(({ rv, iv }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = canvasRef.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['', '', '', '', ''],
                            datasets: [
                                { label: 'RV', data: [rv*0.9, rv*0.95, rv, rv*1.05, rv*1.1], borderColor: '#f85149', borderWidth: 1, pointRadius: 0, tension: 0.4 },
                                { label: 'IV', data: [iv*0.8, iv*0.9, iv, iv*1.1, iv*1.2], borderColor: '#00D2FF', borderWidth: 2, pointRadius: 0, tension: 0.4 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { x: { display: false }, y: { display: false } }
                        }
                    });
                }
            }, [rv, iv]);
            return <div className="h-12 w-full mt-2 opacity-50"><canvas ref={canvasRef}></canvas></div>;
        });

        const ADXSpeedometer = memo(({ adx }) => {
            const pct = Math.min(100, Math.max(0, adx));
            return (
                <div className="relative w-20 h-10 overflow-hidden">
                    <svg viewBox="0 0 100 50" className="w-full h-full">
                        <path d="M10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#222" strokeWidth="8" />
                        <path d="M10 50 A 40 40 0 0 1 90 50" fill="none" stroke="var(--theme-accent)" strokeWidth="8" strokeDasharray={`${(pct/100)*126} 126`} />
                    </svg>
                    <div className="absolute inset-0 flex items-end justify-center pb-0 text-[9px] font-black mono text-white">{adx.toFixed(0)}</div>
                </div>
            );
        });

        const DeltaThermometer = memo(({ delta, threshold }) => {
            const percentage = Math.min(100, Math.max(0, ((delta + threshold) / (threshold * 2)) * 100));
            return (
                <div className="w-full mt-4">
                    <div className="flex justify-between text-[8px] font-black text-gray-600 mb-1 uppercase">
                        <span>Net Delta</span>
                        <span className={Math.abs(delta) > threshold ? 'text-danger' : 'text-accent'}>{delta.toFixed(3)}</span>
                    </div>
                    <div className="h-1.5 bg-white/5 rounded-full relative overflow-hidden">
                        <div className="absolute left-[50%] h-full w-[1px] bg-white/20 z-10"></div>
                        <div className={`h-full transition-all duration-500 rounded-full ${Math.abs(delta) > threshold ? 'bg-danger' : 'bg-accent'}`} style={{ width: `${percentage}%` }}></div>
                    </div>
                </div>
            );
        });

        const WarRoom = memo(({ state, positions, mode, handlePanic, handleHalt, portfolioDelta }) => {
            const [selectedIdx, setSelectedIdx] = useState('NIFTY50');
            const powerData = state.power_five?.[selectedIdx] || {};
            const signals = state.signals || {};

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="oled-card p-5 rounded-2xl flex flex-col justify-between h-48">
                            <div className="flex justify-between items-center mb-2">
                                <h3 className="text-[10px] font-black uppercase text-gray-500">Power Five Matrix (Z)</h3>
                                <div className="flex gap-2">
                                    {['NIFTY50', 'BANKNIFTY', 'SENSEX'].map(idx => (
                                        <button key={idx} onClick={() => setSelectedIdx(idx)} className={`text-[8px] font-black px-1.5 py-0.5 rounded ${selectedIdx === idx ? 'bg-accent text-dark' : 'text-gray-600 hover:text-gray-400'}`}>
                                            {idx === 'BANKNIFTY' ? 'BN' : idx[0]}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="z-matrix mt-2">
                                {Object.entries(powerData).map(([sym, z]) => (
                                    <div key={sym} className="text-center">
                                        <div className="text-[8px] text-gray-400 font-bold">{sym}</div>
                                        <div className={`text-md font-black mono ${z > 1.5 ? 'text-success' : (z < -1.5 ? 'text-danger' : 'text-accent')}`}>{z > 0 ? '+' : ''}{z.toFixed(1)}</div>
                                    </div>
                                ))}
                            </div>
                            <VolatilitySurface rv={signals.rv || 0} iv={signals.atm_iv || 0.18} />
                        </div>

                        {/* D-14: Citadel Indicator */}
                        <div className={`oled-card p-5 rounded-2xl flex flex-col items-center justify-center h-48 border-l-4 transition-all duration-500 ${state.hmm_regime === 'TRENDING' ? 'border-success bg-success/5 shadow-[inset_0_0_40px_rgba(63,185,80,0.05)]' : (state.hmm_regime === 'CRASH' ? 'border-danger bg-danger/5 animate-panic' : 'border-accent bg-accent/5')}`}>
                            <span className="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-2">Citadel Indicator</span>
                            <div className="text-3xl font-black uppercase text-white tracking-tighter">{state.hmm_regime}</div>
                            <div className={`mt-2 px-3 py-1 rounded text-[10px] font-bold ${state.alpha_score > 0 ? 'bg-success/20 text-success' : 'bg-danger/20 text-danger'}`}>Alpha: {state.alpha_score.toFixed(1)}</div>
                            <div className="mt-4 flex gap-4 items-center">
                                <ADXSpeedometer adx={signals.adx || 20} />
                                <span className="text-[8px] font-black text-gray-600 uppercase">Trend<br/>Strength</span>
                            </div>
                        </div>

                        <div className="oled-card p-5 rounded-2xl h-48">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-[10px] font-black uppercase text-gray-500">70:30 Exit Path</h3>
                                <span className="text-[9px] font-bold text-accent">LTP: Tracking...</span>
                            </div>
                            <div className="relative w-full h-3 bg-white/5 rounded-full overflow-hidden mb-6 mt-4">
                                <div className="absolute left-0 h-full bg-accent transition-all duration-1000" style={{ width: `${state.exit_path_70_30?.progress || 0}%` }}></div>
                                <div className="absolute left-[70%] top-0 h-full w-[2px] bg-white border-none shadow-[0_0_10px_white]"></div>
                            </div>
                            <div className="flex justify-between text-[10px] mono">
                                <div className="text-gray-400">Entry: <span className="text-white">---</span></div>
                                <div className="text-gray-400">TP1: <span className="text-success">{(state.exit_path_70_30?.tp1 || 0).toFixed(1)}</span></div>
                                <div className="text-gray-400">TP2: <span className="text-accent">{(state.exit_path_70_30?.tp2 || 0).toFixed(1)}</span></div>
                            </div>
                            <DeltaThermometer delta={portfolioDelta.NIFTY50 || 0} threshold={portfolioDelta.threshold || 0.15} />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="oled-card rounded-2xl p-6">
                            <h3 className="text-xs font-black uppercase mb-6 flex justify-between">
                                <span>Active Engagements</span>
                                <span className="text-accent">{positions.length}</span>
                            </h3>
                            <div className="space-y-4 max-h-96 overflow-y-auto scroll-hide">
                                {positions.map((p, i) => (
                                    <div key={i} className="flex justify-between items-center border-b border-white/5 pb-4 last:border-0">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <div className="font-bold text-sm tracking-tight">{p.symbol}</div>
                                                {p.stall_timer > 300 && <span className="bg-warning/20 text-warning text-[8px] px-1 rounded font-black animate-pulse">STALL</span>}
                                            </div>
                                            <div className="text-[10px] text-gray-500 uppercase font-black">{p.strategy_id}</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-[9px] text-gray-600 font-bold uppercase">Stop (ATR)</div>
                                            <div className="mono text-[10px] text-danger font-bold">{p.atr_stop}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="mono font-bold text-sm">{formatCurrency(p.unrealized_pnl)}</div>
                                            <div className={`text-[10px] font-bold ${p.quantity > 0 ? 'text-success' : 'text-danger'}`}>{p.quantity > 0 ? 'LONG' : 'SHORT'} {Math.abs(p.quantity)}</div>
                                        </div>
                                    </div>
                                ))}
                                {positions.length === 0 && <div className="text-center py-20 text-gray-700 font-bold uppercase text-[10px] tracking-widest">Awaiting Signal...</div>}
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="oled-card p-6 rounded-2xl border-l-4 border-danger animate-panic">
                                <h3 className="text-xs font-black text-danger uppercase mb-4">Tactical Emergency</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={handlePanic} className="bg-danger text-white py-4 rounded-xl font-black text-xs uppercase hover:brightness-125 transition-all focus:ring-4 ring-danger/20 shadow-lg shadow-danger/20">Liquidate All</button>
                                    <button onClick={handleHalt} className="bg-white/5 border border-white/10 text-white py-4 rounded-xl font-black text-xs uppercase hover:bg-white/10 transition-all">Halt VM</button>
                                </div>
                            </div>
                            <div className="oled-card p-6 rounded-2xl">
                                <h3 className="text-xs font-black text-gray-500 uppercase mb-4">Capital Allocation</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-end">
                                        <span className="text-[10px] text-gray-400 font-bold uppercase">Margin Avail ({mode})</span>
                                        <span className="text-xl font-black mono text-white">{formatCurrency(mode === 'Paper' ? state.available_margin_paper : state.available_margin_live)}</span>
                                    </div>
                                    <div className="w-full bg-white/5 h-2 rounded-full"><div className="bg-success h-full rounded-full" style={{ width: '85%' }}></div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        });

        const Playground = memo(({ localEngine, setLocalEngine, localCapital, setLocalCapital, maxLoss, setMaxLoss, hurst, setHurst, confidence, setConfidence, vpin, setVpin, handleHotSwap, mode }) => (
            <div className="space-y-6 oled-card p-8 rounded-3xl animate-in slide-in-from-bottom-5 duration-500">
                <div className="flex justify-between items-start mb-8">
                    <div>
                        <h3 className="text-xl font-black text-white">Regime Orchestrator</h3>
                        <p className="text-xs text-gray-500 mt-1 uppercase font-bold tracking-widest">Modular V6.2 Logic Control</p>
                    </div>
                    <button onClick={handleHotSwap} className="bg-accent text-dark px-8 py-3 rounded-full font-black text-[12px] uppercase shadow-lg shadow-accent/20 hover:scale-105 active:scale-95 transition-all">Apply & Hot-Swap</button>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div className="space-y-10">
                        <div className="grid grid-cols-2 gap-6">
                            <div>
                                <label className="text-[10px] font-black uppercase text-gray-500 block mb-4">Engine Selector</label>
                                <select value={localEngine} onChange={(e) => setLocalEngine(e.target.value)} className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs font-bold text-white outline-none active:border-accent">
                                    <option value="HMM">HMM (Probabilistic)</option>
                                    <option value="Deterministic">Deterministic (Z-Score)</option>
                                    <option value="Hybrid">Hybrid (Consensus Mode)</option>
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase text-gray-500 block mb-4">Base Capital (₹)</label>
                                <input 
                                    type="text" 
                                    value={localCapital} 
                                    onChange={(e) => {
                                        const val = e.target.value.replace(/[^0-9]/g, '');
                                        setLocalCapital(val);
                                    }} 
                                    onBlur={(e) => {
                                        if (e.target.value === '') setLocalCapital(0);
                                    }}
                                    className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs font-bold text-white outline-none focus:border-accent" 
                                />
                                <div className="text-[8px] mt-2 text-gray-600 font-bold uppercase tracking-widest">{mode === 'Paper' ? 'Paper Budget' : 'Live Actual Budget'}</div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase text-gray-500 block mb-4">
                                    {mode === 'Paper' ? 'Paper' : 'Live'} Max Loss / Trade (₹)
                                    <span className="ml-2 text-accent mono">{Number(maxLoss).toLocaleString('en-IN')}</span>
                                </label>
                                <input
                                    type="text"
                                    value={maxLoss}
                                    onChange={(e) => {
                                        const val = e.target.value.replace(/[^0-9]/g, '');
                                        setMaxLoss(val);
                                    }}
                                    onBlur={(e) => { if (e.target.value === '') setMaxLoss('2500'); }}
                                    className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs font-bold text-white outline-none focus:border-accent"
                                />
                                <div className="text-[8px] mt-2 text-gray-600 font-bold uppercase tracking-widest">Hybrid Sizing: ₹ / (ATR × 1.0)</div>
                            </div>
                        </div>
                        <div className="space-y-8">
                            {[
                                { label: 'Hurst Threshold', val: hurst, set: setHurst, min: 0.4, max: 0.7 },
                                { label: 'Hybrid Confidence Floor', val: confidence, set: setConfidence, min: 0.5, max: 0.95 },
                                { label: 'VPIN Toxicity Limit', val: vpin, set: setVpin, min: 0.5, max: 1.0 }
                            ].map(s => (
                                <div key={s.label}>
                                    <div className="flex justify-between text-[10px] font-black uppercase text-gray-400 mb-2">
                                        <span>{s.label}</span>
                                        <span className="text-accent">{s.val.toFixed(2)}</span>
                                    </div>
                                    <input type="range" className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-accent" min={s.min} max={s.max} step="0.01" value={s.val} onChange={(e) => s.set(Number(e.target.value))} />
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-accent/5 rounded-3xl p-8 border border-accent/10 flex flex-col">
                        <h4 className="text-[10px] font-black uppercase text-accent mb-4">Simulation Context</h4>
                        <div className="space-y-6 italic text-[11px] leading-relaxed text-gray-400 flex-1">
                            <p>You are currently managing the <strong>{localEngine}</strong> engine with a <strong>{mode}</strong> theoretical capital of <strong>{formatCurrency(localCapital)}</strong>.</p>
                            <p>Hot-swapping will immediately redirect the Meta-Router signal stream to use these parameters. Live trading is ONLY enabled when Actual Capital {'>'} 0.</p>
                        </div>
                        <div className="mt-8 pt-6 border-t border-white/5 text-[9px] text-gray-600 font-bold uppercase">
                            Risk Warning: Parameter shifts during market hours may cause slippage in position realignment.
                        </div>
                    </div>
                </div>
            </div>
        ));

        const SimulationTab = memo(({ simulation }) => (
            <div className="space-y-8 animate-in zoom-in-95 duration-500">
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    {(simulation.engine_ranking || []).map((r, i) => (
                        <div key={i} className={`oled-card p-6 rounded-2xl border-t-4 ${r.pnl > 0 ? 'border-success' : 'border-danger'}`}>
                            <div className="text-[10px] text-gray-500 font-bold uppercase mb-2">{r.engine} Engine</div>
                            <div className={`text-2xl font-black mono ${r.pnl > 0 ? 'text-success' : 'text-danger'}`}>{formatCurrency(r.pnl)}</div>
                            <div className="text-[9px] text-gray-600 mt-4 flex justify-between">
                                <span>Max DD: ₹{r.drawdown}</span>
                                <span>Trades: {r.trades}</span>
                            </div>
                        </div>
                    ))}
                    <div className="oled-card p-6 rounded-2xl bg-accent/5 flex flex-col justify-center">
                        <div className="text-[9px] text-accent font-black uppercase tracking-widest mb-1">Optimal Engine</div>
                        <div className="text-lg font-bold text-white">Hybrid Consensys</div>
                    </div>
                </div>

                <div className="oled-card p-8 rounded-3xl">
                    <h3 className="text-xs font-black uppercase text-gray-500 mb-8">What-If: Engine Equity Growth (Today)</h3>
                    <div className="h-64 flex items-end gap-1 px-4 relative">
                        {(simulation.equity_growth || []).map((d, i) => (
                            <div key={i} className="flex-1 flex flex-col justify-end gap-0.5 group relative">
                                <div className="bg-success/40 w-full rounded-t-sm" style={{ height: `${(d.HMM / 6000) * 100}%` }} title={`HMM: ${d.HMM}`}></div>
                                <div className="bg-accent/40 w-full" style={{ height: `${(d.Hybrid / 6000) * 100}%` }} title={`Hybrid: ${d.Hybrid}`}></div>
                                <div className="bg-danger/40 w-full" style={{ height: `${Math.max(2, (d.Deterministic / 6000) * 100)}%` }} title={`Det: ${d.Deterministic}`}></div>
                                <span className="absolute -bottom-6 left-0 text-[8px] font-bold text-gray-600 whitespace-nowrap">{d.time}</span>
                            </div>
                        ))}
                    </div>
                    <div className="mt-12 flex gap-8 justify-center">
                        <div className="flex items-center gap-2 text-[10px] font-bold"><div className="w-3 h-3 bg-success/40"></div> HMM</div>

                            confidence={confidence} setConfidence={setConfidence} 
                            vpin={vpin} setVpin={setVpin} 
                            handleHotSwap={handleHotSwap} 
                            mode={mode} 
                        />}
                        {activeTab === 'sim' && <SimulationTab simulation={simulation} />}
                        {activeTab === 'evolution' && <Evolution evolution={evolution} />}
                        {activeTab === 'audit' && <Performance attribution={attribution} />}
                        {activeTab === 'health' && <Health telemetry={telemetry} />}
                        {activeTab === 'attribution' && <SignalAttribution barrierData={barrierData} sizing={sizing} />}
                    </main>

                    <footer className="glass border-t border-white/5 p-3 px-10 flex justify-between items-center text-[10px] font-bold text-gray-500 uppercase tracking-widest bg-black/90">
                        <div className="flex gap-6 items-center">
                            <span className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${state.source === 'VM_DIRECT' ? 'bg-success animate-pulse' : state.source === 'FIRESTORE_SYNC' ? 'bg-warning' : 'bg-danger'}`}></div>
                                {state.source === 'VM_DIRECT' ? 'Redis Live' : state.source === 'FIRESTORE_SYNC' ? 'Cloud Sync' : 'Offline'}
                            </span>
                            <span className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${state.source === 'VM_DIRECT' ? 'bg-success animate-pulse' : 'bg-warning'}`}></div>
                                {state.source === 'VM_DIRECT' ? 'Timescale Live' : 'Archive Mode'}
                            </span>
                            {(state.source === 'FIRESTORE_SYNC' || state.source === 'GCS_PARQUET') && (
                                <span className="text-[8px] text-warning font-black border border-warning/30 bg-warning/5 px-2 py-0.5 rounded animate-pulse">📦 GCS ARCHIVE</span>
                            )}
                            <span className={`text-[8px] font-black border px-2 py-0.5 rounded ${state.source === 'VM_DIRECT' ? 'text-accent border-accent/20' : 'text-warning border-warning/20'}`}>
                                {state.source || 'OFFLINE'}
                            </span>
                        </div>
                        <div className="mono text-gray-600 flex gap-10">
                            <span>UPTIME: 99.9%</span>
                            <span>© 2026 AR-KARTHIK INFRASTRUCTURE</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
