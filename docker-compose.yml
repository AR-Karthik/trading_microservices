services:
  # 1. Infrastructure (must be healthy first)
  redis:
    image: redis:alpine
    container_name: trading_redis
    environment:
      - TZ=Asia/Kolkata
      - SIMULATION_MODE=false
    ports:
      - "6379:6379"
    volumes:
      - /opt/trading/data/redis:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --requirepass ${REDIS_PASSWORD:-trading_redis}
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trading_redis}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    cpuset: "3"

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: trading_timescaledb
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - SIMULATION_MODE=false
    ports:
      - "5432:5432"
    volumes:
      - /opt/trading/data/db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user} -d ${POSTGRES_DB:-trading_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    cpuset: "3"

  # 2. Data Ingestion
  data_gateway:
    image: trading-app:latest
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: data_gateway
    command: python -m daemons.data_gateway
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    volumes:
      - /ram_disk:/ram_disk

  # 3. Market State
  market_sensor:
    image: trading-app:latest
    container_name: market_sensor
    command: python -m daemons.market_sensor
    depends_on:
      data_gateway:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    volumes:
      - /ram_disk:/ram_disk

  # 4. HMM Engines
  hmm_engine_nifty:
    image: trading-app:latest
    container_name: hmm_engine_nifty
    command: python -m daemons.hmm_engine --asset NIFTY50 --core 1
    depends_on:
      market_sensor:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "1"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  hmm_engine_banknifty:
    image: trading-app:latest
    container_name: hmm_engine_banknifty
    command: python -m daemons.hmm_engine --asset BANKNIFTY --core 1
    depends_on:
      market_sensor:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "1"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  hmm_engine_sensex:
    image: trading-app:latest
    container_name: hmm_engine_sensex
    command: python -m daemons.hmm_engine --asset SENSEX --core 1
    depends_on:
      market_sensor:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "1"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  # 5. Meta Router
  meta_router:
    image: trading-app:latest
    container_name: meta_router
    command: python -m daemons.meta_router
    depends_on:
      hmm_engine_nifty:
        condition: service_started
      hmm_engine_banknifty:
        condition: service_started
      hmm_engine_sensex:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "1"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  # 6. Trading Bridges
  paper_bridge:
    image: trading-app:latest
    container_name: paper_bridge
    command: python -m daemons.paper_bridge
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  live_bridge:
    image: trading-app:latest
    container_name: live_bridge
    command: python -m daemons.live_bridge
    depends_on:
      paper_bridge:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  # 7. Strategy Engine
  strategy_engine:
    image: trading-app:latest
    container_name: strategy_engine
    command: python -m daemons.strategy_engine
    depends_on:
      meta_router:
        condition: service_started
      live_bridge:
        condition: service_started
      data_gateway:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "2"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  # 8. Support Daemons
  liquidation_daemon:
    image: trading-app:latest
    container_name: liquidation_daemon
    command: python -m daemons.liquidation_daemon
    depends_on:
      strategy_engine:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "3"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  order_reconciler:
    image: trading-app:latest
    container_name: order_reconciler
    command: python -m daemons.order_reconciler
    depends_on:
      strategy_engine:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  system_controller:
    image: trading-app:latest
    container_name: system_controller
    command: python -m daemons.system_controller
    depends_on:
      strategy_engine:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  telegram_alerter:
    image: trading-app:latest
    container_name: telegram_alerter
    command: python -m utils.telegram_bot
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    cpuset: "3"
    volumes:
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  # 13. Cloud Publisher (Sync to cloud)
  cloud_publisher:
    image: trading-app:latest
    container_name: cloud_publisher
    command: python -m daemons.cloud_publisher
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    ipc: host
    cpuset: "3"
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  fii_dii_fetcher:
    image: trading-app:latest
    container_name: fii_dii_fetcher
    command: python -m daemons.fii_dii_fetcher
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    cpuset: "3"

  # 14. Dashboard API & Frontend (UI - depends on all data sources)
  dashboard_api:
    image: trading-app:latest
    container_name: dashboard_api
    command: python -m uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trading_redis}
      - SIMULATION_MODE=false
    volumes:
      - /ram_disk:/ram_disk
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro

  dashboard_frontend:
    build:
      context: ./dashboard/frontend
    container_name: dashboard_frontend
    ports:
      - "80:80"
    depends_on:
      dashboard_api:
        condition: service_started
    restart: always
    environment:
      - TZ=Asia/Kolkata
      - SIMULATION_MODE=false
