services:
  redis:
    image: redis:alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: trading_timescaledb
    environment:
      - POSTGRES_USER=trading_user
      - POSTGRES_PASSWORD=trading_pass
      - POSTGRES_DB=trading_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  data_gateway:
    build: .
    container_name: data_gateway
    command: python -m daemons.data_gateway
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env

  market_sensor:
    build: .
    container_name: market_sensor
    command: python -m daemons.market_sensor
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      data_gateway:
        condition: service_started
    restart: always
    env_file: .env

  meta_router:
    build: .
    container_name: meta_router
    command: python -m daemons.meta_router
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env

  strategy_engine:
    build: .
    container_name: strategy_engine
    command: python -m daemons.strategy_engine
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      data_gateway:
        condition: service_started
    restart: always
    env_file: .env

  liquidation_daemon:
    build: .
    container_name: liquidation_daemon
    command: python -m daemons.liquidation_daemon
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env

  paper_bridge:
    build: .
    container_name: paper_bridge
    command: python -m daemons.paper_bridge
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: always
    env_file: .env

  trading_api:
    build:
      context: ./dashboard/api
    container_name: trading_api
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=timescaledb
    restart: always

  trading_frontend:
    build:
      context: ./dashboard/frontend
    container_name: trading_frontend
    ports:
      - "8501:80"
    depends_on:
      - trading_api
    restart: always

  telegram_alerter:
    build: .
    container_name: telegram_alerter
    command: python -m utils.telegram_bot
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env

volumes:
  timescaledb_data:
