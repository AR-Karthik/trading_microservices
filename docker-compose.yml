services:
  # 1. Infrastructure (must be healthy first)
  redis:
    image: redis:alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpuset: "3"

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: trading_timescaledb
    env_file: .env # [Audit 8.3] Load secrets from env file, expecting POSTGRES_USER/PASSWORD/DB
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data # [Audit 7.4] Use proper named volume
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    cpuset: "3"

  # 2. Data Ingestion (writes to Redis/SHM)
  data_gateway:
    image: trading-app:latest
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: data_gateway
    command: python -m daemons.data_gateway
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "0"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 3. Market State (Depends on data_gateway ticks)
  market_sensor:
    image: trading-app:latest
    container_name: market_sensor
    command: python -m daemons.market_sensor
    depends_on:
      data_gateway:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 4. HMM Engines (Depends on market_sensor state)
  hmm_engine_nifty:
    image: trading-app:latest
    container_name: hmm_engine_nifty
    command: python -m daemons.hmm_engine --asset NIFTY --core 1
    depends_on:
      market_sensor:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  hmm_engine_banknifty:
    image: trading-app:latest
    container_name: hmm_engine_banknifty
    command: python -m daemons.hmm_engine --asset BANKNIFTY --core 1
    depends_on:
      market_sensor:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  hmm_engine_sensex:
    image: trading-app:latest
    container_name: hmm_engine_sensex
    command: python -m daemons.hmm_engine --asset SENSEX --core 1
    depends_on:
      market_sensor:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 5. Meta Router (Depends on HMM regime)
  meta_router:
    image: trading-app:latest
    container_name: meta_router
    command: python -m daemons.meta_router
    depends_on:
      hmm_engine_nifty:
        condition: service_started
      hmm_engine_banknifty:
        condition: service_started
      hmm_engine_sensex:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 6. Trading Bridges: Paper (Schema Creation First)
  paper_bridge:
    image: trading-app:latest
    container_name: paper_bridge
    command: python -m daemons.paper_bridge
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: always
    env_file: .env
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 7. Trading Bridges: Live (Depends on paper_bridge for schema)
  live_bridge:
    image: trading-app:latest
    container_name: live_bridge
    command: python -m daemons.live_bridge
    depends_on:
      paper_bridge:
        condition: service_started
    restart: always
    env_file: .env
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/var/run/google/gcp_creds.json

  # 8. Strategy Engine (Depends on all above)
  strategy_engine:
    image: trading-app:latest
    container_name: strategy_engine
    command: python -m daemons.strategy_engine
    depends_on:
      meta_router:
        condition: service_started
      live_bridge:
        condition: service_started
      data_gateway:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "2"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 9. Liquidation Daemon (Depends on position data)
  liquidation_daemon:
    image: trading-app:latest
    container_name: liquidation_daemon
    command: python -m daemons.liquidation_daemon
    depends_on:
      strategy_engine:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "3"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 10. Order Reconciler (Depends on order data)
  order_reconciler:
    image: trading-app:latest
    container_name: order_reconciler
    command: python -m daemons.order_reconciler
    depends_on:
      strategy_engine:
        condition: service_started
    restart: always
    env_file: .env
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw

  # 11. System Controller (Lifecycle management)
  system_controller:
    image: trading-app:latest
    container_name: system_controller
    command: python -m daemons.system_controller
    depends_on:
      strategy_engine:
        condition: service_started
    restart: always
    env_file: .env
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw
      - /var/run/google/gcp_creds.json:/var/run/google/gcp_creds.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/var/run/google/gcp_creds.json

  # 12. Telegram Alerter (Monitoring)
  telegram_alerter:
    image: trading-app:latest
    container_name: telegram_alerter
    command: python -m utils.telegram_bot
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "3"

  # 13. Cloud Publisher (Sync to cloud)
  cloud_publisher:
    image: trading-app:latest
    container_name: cloud_publisher
    command: python -m daemons.cloud_publisher
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "3"
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/var/run/google/gcp_creds.json

  # 14. Dashboard API & Frontend (UI - depends on all data sources)
  dashboard_api:
    image: trading-app:latest
    container_name: dashboard_api
    command: python -m uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always
    env_file: .env
    volumes:
      - ${RAM_DISK_PATH:-/ram_disk}:/ram_disk:rw
      - ${GCP_CREDS_PATH:-/var/run/google/gcp_creds.json}:/var/run/google/gcp_creds.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/var/run/google/gcp_creds.json

  dashboard_frontend:
    build:
      context: ./dashboard/frontend
    container_name: dashboard_frontend
    ports:
      - "80:80"
    depends_on:
      - dashboard_api
    restart: always

volumes:
  timescaledb_data:
