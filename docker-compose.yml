services:
  redis:
    image: redis:alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpuset: "3"

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: trading_timescaledb
    environment:
      - POSTGRES_USER=trading_user
      - POSTGRES_PASSWORD=trading_pass
      - POSTGRES_DB=trading_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    cpuset: "3"

  data_gateway:
    image: trading-app:latest
    build:
      context: .
      network: host
    container_name: data_gateway
    command: python -m daemons.data_gateway
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "0"
    volumes:
      - /ram_disk:/ram_disk

  market_sensor:
    image: trading-app:latest
    container_name: market_sensor
    command: python -m daemons.market_sensor
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      data_gateway:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - /ram_disk:/ram_disk

  meta_router:
    image: trading-app:latest
    container_name: meta_router
    command: python -m daemons.meta_router
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "1"
    volumes:
      - /ram_disk:/ram_disk

  strategy_engine:
    image: trading-app:latest
    container_name: strategy_engine
    command: python -m daemons.strategy_engine
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      data_gateway:
        condition: service_started
    restart: always
    env_file: .env
    cpuset: "2"
    volumes:
      - /ram_disk:/ram_disk

  liquidation_daemon:
    image: trading-app:latest
    container_name: liquidation_daemon
    command: python -m daemons.liquidation_daemon
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "3"
    volumes:
      - /ram_disk:/ram_disk

  paper_bridge:
    image: trading-app:latest
    container_name: paper_bridge
    command: python -m daemons.paper_bridge
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: always
    env_file: .env

  cloud_publisher:
    image: trading-app:latest
    container_name: cloud_publisher
    command: python -m daemons.cloud_publisher
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "3"

  telegram_alerter:
    image: trading-app:latest
    container_name: telegram_alerter
    command: python -m utils.telegram_bot
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    env_file: .env
    cpuset: "3"

volumes:
  timescaledb_data:
